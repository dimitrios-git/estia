---
# Default map of the machine's `uname -m` to the arch token used in release asset
# filenames. This is the fallback; a binary whose releases name an arch differently
# (e.g. `amd64` for x86_64, as hcloud/opentofu do) overrides it with a per-entry
# `arch_map:` in the manifest. Extend this map if you add a new CPU arch.
localbin_arch_map:
  x86_64: x86_64
  aarch64: arm64
